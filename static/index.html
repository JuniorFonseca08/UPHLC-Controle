<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPH Loteamento Conceição</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --green-dark:  #0d3d1f;
    --green-mid:   #155c2e;
    --green-light: #1e7a3e;
    --green-accent:#2da050;
    --white:       #ffffff;
    --off-white:   #f4f6f4;
    --grey-light:  #e8ece8;
    --grey-mid:    #b8c4b8;
    --grey-text:   #6b7b6b;
    --text-dark:   #1a2a1a;
    --radius:      14px;
    --radius-sm:   10px;
    --shadow:      0 2px 12px rgba(13,61,31,0.10);
    --shadow-md:   0 4px 24px rgba(13,61,31,0.16);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--green-dark);
    color: var(--text-dark);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--green-dark);
    padding: 20px 20px 28px;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-img {
    width: 52px; height: 28px;
    object-fit: contain;
    filter: brightness(0) invert(1);
    opacity: 0.92;
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
    line-height: 1;
  }

  .header-sub {
    font-size: 10px;
    font-weight: 600;
    color: var(--green-accent);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .header-date {
    font-size: 12px;
    color: var(--grey-mid);
    font-weight: 500;
    text-align: right;
    line-height: 1.5;
  }

  .header-divider {
    height: 1px;
    background: linear-gradient(90deg, var(--green-accent) 0%, transparent 100%);
    margin-top: 18px;
    opacity: 0.4;
  }

  /* MAIN */
  .main {
    background: var(--off-white);
    border-radius: 22px 22px 0 0;
    min-height: calc(100vh - 110px);
    padding: 24px 16px 56px;
  }

  /* CARDS */
  .cards-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }

  .card {
    border-radius: var(--radius);
    padding: 18px 16px;
    position: relative;
    overflow: hidden;
  }

  .card-primary {
    background: var(--green-mid);
    grid-column: span 2;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 20px;
  }

  .card-primary::after {
    content: '';
    position: absolute;
    right: -20px; top: -20px;
    width: 110px; height: 110px;
    border-radius: 50%;
    background: var(--green-accent);
    opacity: 0.10;
  }

  .card-secondary {
    background: var(--white);
    box-shadow: var(--shadow);
    border: 1px solid var(--grey-light);
  }

  .card-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 6px;
  }

  .card-primary .card-label { color: var(--green-accent); }
  .card-secondary .card-label { color: var(--grey-text); }

  .card-value {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    line-height: 1;
  }

  .card-primary .card-value { font-size: 30px; color: var(--white); }
  .card-secondary .card-value { font-size: 20px; color: var(--green-dark); }

  .card-icon-big { font-size: 34px; opacity: 0.5; }
  .card-secondary .card-icon { font-size: 18px; margin-bottom: 10px; display: block; }

  /* SECTION TITLE */
  .section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.8px;
    color: var(--grey-text);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--grey-light);
  }

  /* BOTÕES */
  .btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .action-btn {
    background: var(--white);
    border: 1px solid var(--grey-light);
    border-radius: var(--radius);
    padding: 18px 14px;
    cursor: pointer;
    text-align: left;
    box-shadow: var(--shadow);
    transition: transform 0.12s, box-shadow 0.12s;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .action-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
  }

  .action-btn:active { transform: scale(0.97); box-shadow: var(--shadow-md); }

  .btn-cadastro::before   { background: var(--green-mid); }
  .btn-mensalidade::before { background: #a07020; }
  .btn-pagamento::before  { background: #1e7a3e; }
  .btn-retirada::before   { background: #8b2a2a; }

  .btn-icon-wrap {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
  }

  .btn-cadastro   .btn-icon-wrap { background: #e8f0ea; }
  .btn-mensalidade .btn-icon-wrap { background: #f5eed8; }
  .btn-pagamento  .btn-icon-wrap { background: #ddf0e3; }
  .btn-retirada   .btn-icon-wrap { background: #f5dede; }

  .btn-label { font-size: 14px; font-weight: 700; color: var(--text-dark); }
  .btn-sub   { font-size: 11px; color: var(--grey-text); font-weight: 500; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13,61,31,0.55);
    backdrop-filter: blur(3px);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.open {
    display: flex;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

  .modal-sheet {
    background: var(--white);
    border-radius: 22px 22px 0 0;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    padding: 10px 20px 48px;
    animation: slideUp 0.28s cubic-bezier(.22,.68,0,1.2);
  }

  @keyframes slideUp {
    from { transform: translateY(100%) }
    to   { transform: translateY(0) }
  }

  .modal-handle {
    width: 38px; height: 4px;
    background: var(--grey-light);
    border-radius: 4px;
    margin: 10px auto 22px;
  }

  .modal-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--grey-light);
  }

  .modal-header-icon {
    width: 42px; height: 42px;
    border-radius: 10px;
    background: #e8f0ea;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--green-dark);
  }

  /* INPUTS */
  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--grey-text);
    margin-bottom: 6px;
  }

  .field input,
  .field select {
    width: 100%;
    background: var(--off-white);
    border: 1.5px solid var(--grey-light);
    border-radius: var(--radius-sm);
    padding: 13px 14px;
    color: var(--text-dark);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    font-weight: 600;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  .field input:focus,
  .field select:focus { border-color: var(--green-mid); background: var(--white); }
  .field input::placeholder { color: var(--grey-mid); }

  /* BOTÃO SALVAR */
  .save-btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
    transition: all 0.15s;
    letter-spacing: 0.2px;
  }

  .save-btn:disabled { background: var(--grey-light); color: var(--grey-mid); cursor: not-allowed; }

  .save-btn.active {
    background: var(--green-mid);
    color: var(--white);
    box-shadow: 0 4px 16px rgba(21,92,46,0.3);
  }

  .save-btn.active:active { transform: scale(0.98); }

  /* MESES */
  .meses-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--grey-text);
    margin-bottom: 10px;
  }

  .meses-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .mes-btn {
    background: var(--off-white);
    border: 1.5px solid var(--grey-light);
    border-radius: 8px;
    padding: 11px 4px;
    color: var(--text-dark);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.12s;
    line-height: 1.3;
  }

  .mes-btn.pago {
    background: #e8f5ec;
    border-color: var(--green-accent);
    color: var(--green-mid);
    cursor: default;
    font-size: 11px;
  }

  .mes-btn.selecionado {
    background: var(--green-mid);
    border-color: var(--green-mid);
    color: var(--white);
    transform: scale(1.05);
  }

  /* CONFIRMAR */
  .confirmar-box {
    background: var(--off-white);
    border: 1px solid var(--grey-light);
    border-radius: var(--radius-sm);
    padding: 16px;
    margin-bottom: 8px;
  }

  .confirmar-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
  }

  .confirmar-row .cl { font-size: 13px; color: var(--grey-text); font-weight: 600; }
  .confirmar-row .cv {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--green-dark);
  }

  /* TOAST */
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translateX(-50%) translateY(-50%) scale(0.9);
    background: var(--green-dark);
    color: var(--white);
    padding: 11px 22px;
    border-radius: 40px;
    font-size: 13px;
    font-weight: 700;
    z-index: 999;
    opacity: 0;
    transition: all 0.25s ease;
    white-space: nowrap;
    border: 1px solid var(--green-accent);
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-50%) scale(1); }

  /* BOTÃO HISTÓRICO */
  .btn-historico {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--green-dark);
    border: none;
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    width: 100%;
    margin-top: 10px;
    transition: opacity 0.15s;
  }
  .btn-historico:active { opacity: 0.8; }
  .btn-historico-left { display: flex; align-items: center; gap: 12px; }
  .btn-historico-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: rgba(45,160,80,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
  }
  .btn-historico-label { font-size: 14px; font-weight: 700; color: var(--white); }
  .btn-historico-sub { font-size: 11px; color: var(--green-accent); font-weight: 500; margin-top: 1px; }
  .btn-historico-arrow { color: var(--green-accent); font-size: 18px; }

  /* HISTÓRICO MODAL */
  .hist-filtros { display: flex; gap: 8px; margin-bottom: 16px; }
  .hist-filtros select {
    flex: 1;
    background: var(--off-white);
    border: 1.5px solid var(--grey-light);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    color: var(--text-dark);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 600;
    outline: none;
    -webkit-appearance: none;
  }
  .hist-filtros select:focus { border-color: var(--green-mid); }

  .hist-resumo { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .hist-resumo-card {
    background: var(--off-white);
    border: 1px solid var(--grey-light);
    border-radius: var(--radius-sm);
    padding: 12px 10px;
    text-align: center;
  }
  .hist-resumo-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--grey-text); margin-bottom: 4px; }
  .hist-resumo-val { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 900; line-height: 1; }
  .hist-resumo-val.entrada { color: var(--green-mid); }
  .hist-resumo-val.saida   { color: #b03030; }
  .hist-resumo-val.saldo   { color: var(--text-dark); }

  .hist-lista { display: flex; flex-direction: column; gap: 8px; }
  .hist-item {
    background: var(--white);
    border: 1px solid var(--grey-light);
    border-radius: var(--radius-sm);
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .hist-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .hist-item.entrada::before { background: var(--green-accent); }
  .hist-item.saida::before   { background: #c0392b; }
  .hist-item-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .hist-item.entrada .hist-item-icon { background: #ddf0e3; }
  .hist-item.saida   .hist-item-icon { background: #f5dede; }
  .hist-item-info { flex: 1; min-width: 0; }
  .hist-item-desc { font-size: 12px; font-weight: 700; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hist-item-date { font-size: 10px; color: var(--grey-text); font-weight: 500; margin-top: 2px; }
  .hist-item-valor { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 900; flex-shrink: 0; }
  .hist-item.entrada .hist-item-valor { color: var(--green-mid); }
  .hist-item.saida   .hist-item-valor { color: #c0392b; }

  .hist-vazio { text-align: center; padding: 40px 20px; color: var(--grey-text); font-size: 14px; font-weight: 600; }
  .hist-vazio-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.5; }</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo-wrap">
      <img class="logo-img" src="/static/logo.png" alt="Logo UPH">
      <div>
        <div class="header-title">UPH Loteamento Conceição</div>
        <div class="header-sub">Gestão Financeira</div>
      </div>
    </div>
    <div class="header-date" id="headerDate"></div>
  </div>
  <div class="header-divider"></div>
</div>

<div class="main">

  <div class="cards-row">
    <div class="card card-primary">
      <div>
        <div class="card-label">Saldo em Caixa</div>
        <div class="card-value" id="saldoTotal">R$ 0,00</div>
      </div>
      <div class="card-icon-big">🏦</div>
    </div>
    <div class="card card-secondary">
      <span class="card-icon">📅</span>
      <div class="card-label">Mês Atual</div>
      <div class="card-value" id="saldoMes">R$ 0,00</div>
    </div>
    <div class="card card-secondary">
      <span class="card-icon">👥</span>
      <div class="card-label">Membros</div>
      <div class="card-value" id="totalMembros">—</div>
    </div>
  </div>

  <div class="section-title">Ações</div>

  <div class="btn-grid">
    <button class="action-btn btn-cadastro" onclick="abrirModal('cadastro')">
      <div class="btn-icon-wrap">👤</div>
      <div>
        <div class="btn-label">Cadastrar</div>
        <div class="btn-sub">Novo membro</div>
      </div>
    </button>
    <button class="action-btn btn-mensalidade" onclick="abrirModal('mensalidade')">
      <div class="btn-icon-wrap">🗓️</div>
      <div>
        <div class="btn-label">Mensalidade</div>
        <div class="btn-sub">Registrar</div>
      </div>
    </button>
    <button class="action-btn btn-pagamento" onclick="abrirModal('pagamento')">
      <div class="btn-icon-wrap">💵</div>
      <div>
        <div class="btn-label">Receber</div>
        <div class="btn-sub">Pagamento</div>
      </div>
    </button>
    <button class="action-btn btn-retirada" onclick="abrirModal('retirada')">
      <div class="btn-icon-wrap">📤</div>
      <div>
        <div class="btn-label">Retirada</div>
        <div class="btn-sub">Registrar saída</div>
      </div>
    </button>
  </div>

  <div class="section-title" style="margin-top:24px">Relatórios</div>

  <button class="btn-historico" onclick="abrirHistorico()">
    <div class="btn-historico-left">
      <div class="btn-historico-icon">📋</div>
      <div>
        <div class="btn-historico-label">Histórico de Movimentações</div>
        <div class="btn-historico-sub">Ver entradas e saídas</div>
      </div>
    </div>
    <div class="btn-historico-arrow">›</div>
  </button>

</div>

<div id="modal" class="modal-overlay" onclick="fecharPorOverlay(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
  </div>
</div>

<!-- MODAL HISTÓRICO (tela cheia) -->
<div id="modalHistorico" class="modal-overlay" onclick="fecharHistoricoPorOverlay(event)">
  <div class="modal-sheet" style="max-height:95vh">
    <div class="modal-handle"></div>
    <div id="historicoContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let mesesSelecionados = [];

// ⚡ Executa quando a página termina de carregar
document.addEventListener("DOMContentLoaded", () => {
  // carrega membros e atualiza apenas a contagem
  carregarMembros(() => {}); // callback vazio, pois ainda não estamos selecionando meses
});

const d = new Date();
const meses = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
document.getElementById("headerDate").innerHTML =
  `<div>${d.getDate()} ${meses[d.getMonth()]}</div><div>${d.getFullYear()}</div>`;

function abrirModal(tipo) {
  const modal = document.getElementById("modal");
  const content = document.getElementById("modalContent");
  mesesSelecionados = [];

  if (tipo === "cadastro") {
    content.innerHTML = `
      <div class="modal-header">
        <div class="modal-header-icon">👤</div>
        <div class="modal-title">Cadastrar Membro</div>
      </div>
      <div class="field"><label>Nome completo</label>
        <input id="nome" placeholder="Ex: João da Silva" oninput="validarCadastro()">
      </div>
      <div class="field"><label>Telefone</label>
        <input id="telefone" placeholder="(81) 99999-9999" type="tel">
      </div>
      <button id="btnSalvar" class="save-btn" disabled onclick="cadastrar()">Salvar Membro</button>
    `;
  }

  if (tipo === "mensalidade") {
      content.innerHTML = `
        <div class="modal-header">
          <div class="modal-header-icon">🗓️</div>
          <div class="modal-title">Mensalidades</div>
        </div>
        <div class="field"><label>Membro</label>
          <select id="membro"></select>
        </div>
        <div class="meses-label">Selecione os meses</div>
        <div id="meses" class="meses-grid"></div>
        <div id="confirmarArea"></div>
      `;
      carregarMembros(carregarMensalidades); // agora não carrega automaticamente
    }

    if (tipo === "pagamento") {
      const hoje = new Date().toISOString().split("T")[0];

      content.innerHTML = `
        <div class="modal-header">
          <div class="modal-header-icon" style="background:#ddf0e3">💵</div>
          <div class="modal-title">Receber Pagamento</div>
        </div>
        <div class="field">
          <label>Valor (R$)</label>
          <input id="valor" placeholder="0,00" type="number" oninput="validarRetirada()">
        </div>
        <div class="field">
          <label>Descrição</label>
          <input id="desc" placeholder="Ex: Doação, evento...">
        </div>
        <div class="field">
          <label>Data</label>
          <input id="data" type="date" value="${hoje}">
        </div>
        <button id="btnSalvar" class="save-btn" disabled onclick="pagar()">
          Confirmar Recebimento
        </button>
      `;
    }

  if (tipo === "retirada") {
      const hoje = new Date().toISOString().split("T")[0];

      content.innerHTML = `
        <div class="modal-header">
          <div class="modal-header-icon" style="background:#f5dede">📤</div>
          <div class="modal-title">Registrar Retirada</div>
        </div>

        <div class="field">
          <label>Valor (R$)</label>
          <input id="valor" placeholder="0,00" type="number" oninput="validarRetirada()">
        </div>

        <div class="field">
          <label>Descrição</label>
          <input id="desc" placeholder="Ex: Compra de material..." oninput="validarRetirada()">
        </div>

        <div class="field">
          <label>Data</label>
          <input id="data" type="date" value="${hoje}" oninput="validarRetirada()">
        </div>

        <button id="btnSalvar" class="save-btn" disabled onclick="retirar()">Confirmar Retirada</button>
      `;
    }

  modal.classList.add("open");
}

function fecharPorOverlay(e) {
  if (e.target.id === "modal") fecharModal();
}

function fecharModal(msg = "") {
  document.getElementById("modal").classList.remove("open");
  if (msg) mostrarToast(msg);
  carregarSaldo();
  carregarSaldoMes();
}

async function carregarTotalMembros() {
  const res = await fetch("/membros");
  const membros = await res.json();
  const el = document.getElementById("totalMembros");
  if (el) el.innerText = membros.length;
}

async function carregarMembros(callback) {
  const select = document.getElementById("membro");
  if (!select) return;

  // limpa opções
  select.innerHTML = "";

  // opção padrão vazia
  const opcaoVazia = document.createElement("option");
  opcaoVazia.value = "";
  opcaoVazia.text = "-- Selecione um membro --";
  opcaoVazia.selected = true;
  opcaoVazia.disabled = true;
  select.appendChild(opcaoVazia);

  // buscar membros da API
  const res = await fetch("/membros");
  let membros = await res.json();

  // 🔹 ordenar alfabeticamente pelo nome
  membros.sort((a, b) => a.nome_completo.localeCompare(b.nome_completo, "pt", { sensitivity: "base" }));

  // adiciona membros no select
  membros.forEach(m => {
    const opt = document.createElement("option");
    opt.value = m.id;
    opt.text = m.nome_completo;
    select.appendChild(opt);
  });

  // chama callback quando o usuário selecionar algo
  select.onchange = () => {
    if (select.value) callback();
  };
}

async function cadastrar() {
  const nome = document.getElementById("nome").value.trim();
  const telefone = document.getElementById("telefone").value;
  if (!nome) return;

  try {
    const res = await fetch(`/membros?nome_completo=${nome}&telefone=${telefone}`, { method: "POST" });
    if (!res.ok) {
      const data = await res.json();
      mostrarToast(data.detail || "Erro ao cadastrar membro");
      return;
    }
    await carregarMembros();
    await carregarTotalMembros();
    fecharModal("Membro cadastrado com sucesso!");
  } catch (err) {
    mostrarToast("Erro ao cadastrar membro");
  }
}

async function carregarMensalidades() {
  const membro = document.getElementById("membro").value;
  const ano = new Date().getFullYear();
  try {
    const res = await fetch(`/mensalidades/${membro}?ano=${ano}`);
    const dados = await res.json();
    gerarMeses(dados.map(m => parseInt(m.mes)));
  } catch(e) { gerarMeses([]); }
}

function gerarMeses(pagos) {
  const div = document.getElementById("meses");
  if (!div) return;
  div.innerHTML = "";
  const nomes = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  for (let i = 1; i <= 12; i++) {
    const btn = document.createElement("button");
    const pago = pagos.includes(i);
    btn.className = "mes-btn" + (pago ? " pago" : "");
    btn.innerHTML = pago ? `${nomes[i-1]}<br>✓` : nomes[i-1];
    if (pago) btn.disabled = true;
    else btn.onclick = () => selecionarMes(i, btn);
    div.appendChild(btn);
  }
}

function selecionarMes(mes, btn) {
  const index = mesesSelecionados.indexOf(mes);
  if (index > -1) { mesesSelecionados.splice(index, 1); btn.classList.remove("selecionado"); }
  else { mesesSelecionados.push(mes); btn.classList.add("selecionado"); }
  mostrarBotaoConfirmar();
}

function mostrarBotaoConfirmar() {
  const div = document.getElementById("confirmarArea");
  if (!div) return;
  if (!mesesSelecionados.length) { div.innerHTML = ""; return; }
  const total = mesesSelecionados.length * 10;
  div.innerHTML = `
    <div class="confirmar-box">
      <div class="confirmar-row">
        <span class="cl">${mesesSelecionados.length} mês(es)</span>
        <span class="cv">R$ ${total}</span>
      </div>
      <button class="save-btn active" onclick="confirmarPagamento()">Confirmar Pagamento</button>
    </div>
  `;
}

async function confirmarPagamento() {
  if (!mesesSelecionados.length) return;
  const membro = document.getElementById("membro").value;
  const ano = new Date().getFullYear();
  for (let mes of mesesSelecionados)
    await fetch(`/mensalidade/pagar?membro_id=${membro}&mes=${mes}&ano=${ano}&valor=10`, { method: "POST" });
  mesesSelecionados = [];
  carregarMensalidades(); carregarSaldo(); carregarSaldoMes();
  mostrarToast("Pagamento confirmado!");
}

async function pagar() {
  const valor = document.getElementById("valor").value;
  const desc = document.getElementById("desc").value;
  const data = document.getElementById("data").value;

  await fetch(`/movimentacoes?tipo=entrada&valor=${valor}&descricao=${desc}&data=${data}`, {
    method: "POST"
  });

  fecharModal("Pagamento registrado!");
}

async function retirar() {
  const valor = document.getElementById("valor").value;
  const desc = document.getElementById("desc").value;
  const data = document.getElementById("data").value;

  console.log("Enviando retirada com data:", data); // debug

  await fetch(`/movimentacoes?tipo=retirada&valor=${valor}&descricao=${desc}&data=${data}`, { method: "POST" });
  fecharModal("Retirada registrada!");
}

async function carregarSaldo() {
  try {
    const res = await fetch("/saldo");
    const data = await res.json();
    document.getElementById("saldoTotal").innerText = "R$ " + Number(data.saldo).toFixed(2).replace(".",",");
  } catch(e) {}
}

async function carregarSaldoMes() {
  try {
    const hoje = new Date();
    const res = await fetch(`/saldo-mensal?mes=${hoje.getMonth()+1}&ano=${hoje.getFullYear()}`);
    const data = await res.json();
    document.getElementById("saldoMes").innerText = "R$ " + Number(data.saldo_mensal).toFixed(2).replace(".",",");
  } catch(e) {}
}

function validarCadastro() {
  const nome = document.getElementById("nome").value.trim();
  const btn = document.getElementById("btnSalvar");
  btn.disabled = !nome;
  btn.className = nome ? "save-btn active" : "save-btn";
}

function validarRetirada() {
  const valor = document.getElementById("valor").value;
  const btn = document.getElementById("btnSalvar");
  btn.disabled = !valor;
  btn.className = valor ? "save-btn active" : "save-btn";
}

function mostrarToast(texto) {
  const t = document.getElementById("toast");
  t.innerText = "✓  " + texto;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

carregarSaldo();
carregarSaldoMes();
carregarMembros();
carregarTotalMembros();

// ── HISTÓRICO ──
function fecharHistoricoPorOverlay(e) {
  if (e.target.id === "modalHistorico")
    document.getElementById("modalHistorico").classList.remove("open");
}

function fecharHistorico() {
  document.getElementById("modalHistorico").classList.remove("open");
}

async function abrirHistorico() {
  const modal = document.getElementById("modalHistorico");
  const content = document.getElementById("historicoContent");
  const hoje = new Date();

  content.innerHTML = `
    <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center;">
      <div style="display:flex; align-items:center; gap:10px;">
        <div class="modal-header-icon" style="background:#e8f0ea">📋</div>
        <div class="modal-title">Movimentações</div>
      </div>
    
    <button onclick="fecharHistorico()" style="
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: #f1f1f1;
      color: #444;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
    ">
      ❌
    </button>
    </div>
    <div class="hist-filtros">
      <select id="filtroMes" onchange="filtrarHistorico()">
        <option value="todos" selected>Todos</option>
        ${["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"]
          .map((m,i) => `<option value="${i+1}">${m}</option>`).join('')}
      </select>
      <select id="filtroAno" onchange="filtrarHistorico()">
        ${[hoje.getFullYear(), hoje.getFullYear()-1]
          .map(a => `<option value="${a}">${a}</option>`).join('')}
      </select>
      <select id="filtroTipo" onchange="filtrarHistorico()">
        <option value="todos">Todos</option>
        <option value="entrada">Entradas</option>
        <option value="retirada">Saídas</option>
      </select>
    </div>
    <div id="histResumo" class="hist-resumo">
      <div class="hist-resumo-card"><div class="hist-resumo-label">Entradas</div><div class="hist-resumo-val entrada" id="rEntradas">R$ 0</div></div>
      <div class="hist-resumo-card"><div class="hist-resumo-label">Saídas</div><div class="hist-resumo-val saida" id="rSaidas">R$ 0</div></div>
      <div class="hist-resumo-card"><div class="hist-resumo-label">Saldo</div><div class="hist-resumo-val saldo" id="rSaldo">R$ 0</div></div>
    </div>
    <div id="histLista" class="hist-lista"></div>
  `;

  modal.classList.add("open");
  await filtrarHistorico();
}

async function filtrarHistorico() {
  const mesSelecionado = document.getElementById("filtroMes").value;
  const mes = mesSelecionado === "todos" ? null : Number(mesSelecionado);
  const ano  = document.getElementById("filtroAno").value;
  const tipo = document.getElementById("filtroTipo").value;
  const lista = document.getElementById("histLista");

  lista.innerHTML = `<div class="hist-vazio"><div class="hist-vazio-icon">⏳</div>Carregando...</div>`;

  try {
    let url = `/movimentacoes?ano=${ano}`;
    if (mes !== null) {
        url += `&mes=${mes}`;
    }
    const res = await fetch(url);
    const dados = await res.json();

    const nomesMes = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

    let filtrados;
    if (tipo === "todos") {
      filtrados = dados;
    } else if (tipo === "entrada") {
      filtrados = dados.filter(d => d.tipo === "entrada" || d.tipo === "mensalidade");
    } else {
      filtrados = dados.filter(d => d.tipo === "retirada");
    }

    // Resumo
    const entradas = dados
      .filter(d => d.tipo === "entrada" || d.tipo === "mensalidade")
      .reduce((s, d) => s + Number(d.valor), 0);

    const saidas = dados
      .filter(d => d.tipo === "retirada")
      .reduce((s, d) => s + Number(d.valor), 0);

    const saldoPer = entradas - saidas;

    document.getElementById("rEntradas").innerText = "R$ " + entradas.toFixed(2).replace(".",",");
    document.getElementById("rSaidas").innerText   = "R$ " + saidas.toFixed(2).replace(".",",");
    document.getElementById("rSaldo").innerText    = "R$ " + saldoPer.toFixed(2).replace(".",",");
    document.getElementById("rSaldo").className    = "hist-resumo-val " + (saldoPer >= 0 ? "entrada" : "saida");

    if (!filtrados.length) {
      lista.innerHTML = `<div class="hist-vazio"><div class="hist-vazio-icon">📭</div>Nenhuma movimentação encontrada</div>`;
      return;
    }

    lista.innerHTML = "";
    filtrados.sort((a, b) => {
        const dataA = a.data ? new Date(a.data) : new Date(0);
        const dataB = b.data ? new Date(b.data) : new Date(0);
        return dataB - dataA; // mais recente primeiro
    });

    filtrados.forEach(item => {
      const entrada = item.tipo === "entrada" || item.tipo === "mensalidade";
      const data = item.data ? new Date(item.data) : null;
      const dataStr = data
        ? `${data.getDate()} ${nomesMes[data.getMonth()]} ${data.getFullYear()}`
        : "—";

      const div = document.createElement("div");
      div.className = "hist-item " + (entrada ? "entrada" : "saida");
      div.innerHTML = `
      <div class="hist-item-icon">${entrada ? "💵" : "📤"}</div>
      <div class="hist-item-info">
          <div class="hist-item-desc">
            ${
              item.descricao
                ? item.descricao
                : item.tipo === "mensalidade"
                  ? "Mensalidade"
                  : entrada
                    ? "Entrada"
                    : "Retirada"
            }
          </div>
          <div class="hist-item-data" style="font-size:0.8em; color:#666;">
            ${dataStr ? dataStr : "—"}
          </div>
      </div>
      <div class="hist-item-valor">${entrada ? "+" : "−"} R$ ${Number(item.valor).toFixed(2).replace(".",",")}</div>
    `;
      lista.appendChild(div);
    });

  } catch(e) {
    lista.innerHTML = `<div class="hist-vazio"><div class="hist-vazio-icon">⚠️</div>Erro ao carregar dados</div>`;
  }
}
</script>
</body>
</html>
